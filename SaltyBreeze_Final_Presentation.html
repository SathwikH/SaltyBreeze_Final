
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f1e;color:#e2e8f0;font-family:'Sora',sans-serif}
.app{min-height:600px;display:flex;flex-direction:column;background:#0a0f1e;border-radius:12px;overflow:hidden}
.slide{flex:1;padding:32px 36px 20px;display:flex;flex-direction:column;gap:16px;animation:fadeIn .35s ease}

.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-top:1px solid #1f2d44;background:#0d1425}
.nav-btn{background:transparent;border:1px solid #1f2d44;color:#94a3b8;padding:6px 18px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .2s}
.nav-btn:hover:not(:disabled){border-color:#22d3ee;color:#22d3ee}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-dots{display:flex;gap:6px;flex-wrap:wrap;max-width:200px;justify-content:center}
.dot{width:7px;height:7px;border-radius:50%;background:#1f2d44;transition:background .2s;cursor:pointer}
.dot.active{background:#22d3ee}
.tag{display:inline-block;padding:3px 10px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;font-size:13px;font-weight:600;border:1px solid}
h1{font-size:28px;font-weight:700;line-height:1.2}
h2{font-size:20px;font-weight:600}
h3{font-size:15px;font-weight:600}
.mono{font-family:'JetBrains Mono',monospace}
.muted{color:#64748b}
.card{background:#111827;border:1px solid #1f2d44;border-radius:10px;padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.active-link{stroke-dasharray:8 4;animation:dashAnim 1s linear infinite}
@keyframes dashAnim{to{stroke-dashoffset:-24}}
.scen-btn{background:#111827;border:1px solid #1f2d44;color:#94a3b8;padding:8px 12px;border-radius:8px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;transition:all .2s;text-align:left}
.scen-btn:hover{border-color:#22d3ee;color:#22d3ee}
.scen-btn.active{border-color:#22d3ee;color:#22d3ee;background:#0c1f30}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-family:'JetBrains Mono',monospace}

.ref-link:hover{text-decoration:underline}

<script>
const COLORS={bg:'#0a0f1e',surface:'#111827',surf2:'#1a2332',border:'#1f2d44',cyan:'#22d3ee',purple:'#a78bfa',yellow:'#fbbf24',green:'#34d399',text:'#e2e8f0',muted:'#64748b'};
const ROUTERS={A:{x:80,y:80,area:1},D:{x:280,y:80,area:0},F:{x:500,y:80,area:2},B:{x:80,y:230,area:1},C:{x:200,y:230,area:1},E:{x:340,y:230,area:0},G:{x:460,y:230,area:2},H:{x:580,y:230,area:2}};
const LINKS=[{id:'AB',from:'A',to:'B',cost:20},{id:'AC',from:'A',to:'C',cost:20},{id:'AD',from:'A',to:'D',cost:5},{id:'BC',from:'B',to:'C',cost:20},{id:'CE',from:'C',to:'E',cost:5},{id:'DE',from:'D',to:'E',cost:5},{id:'DF',from:'D',to:'F',cost:5},{id:'EG',from:'E',to:'G',cost:5},{id:'FG',from:'F',to:'G',cost:10},{id:'FH',from:'F',to:'H',cost:10},{id:'GH',from:'G',to:'H',cost:10}];
const AREACOLOR={0:COLORS.yellow,1:COLORS.cyan,2:COLORS.purple};
const SCENARIOS=[
  {id:'noArea_AC',label:'No Area - A to C',path:['A','D','E','C'],cost:15,desc:'No areas set, so OSPF picks the cheapest route: A-D-E-C (cost 5+5+5 = 15)',color:'#22d3ee'},
  {id:'area_AC',  label:'With Areas - A to C',path:['A','C'],cost:20,desc:'A and C are in the same area, so OSPF stays local: A-C (cost 20)',color:'#a78bfa'},
  {id:'noArea_BH',label:'No Area - B to H',path:['B','C','E','G','H'],cost:40,desc:'No areas set, so OSPF freely picks the shortest path: B-C-E-G-H (cost 40)',color:'#22d3ee'},
  {id:'area_BH',  label:'With Areas - B to H',path:['B','A','D','F','H'],cost:40,desc:'B is in Area 1, H is in Area 2, so traffic must go through the backbone: B-A-D-F-H (cost 40)',color:'#a78bfa'},
];

const DK_NODES={S:{x:70,y:140},A:{x:210,y:60},B:{x:210,y:220},C:{x:350,y:220},T:{x:490,y:140}};
const DK_EDGES=[
  {id:'SA',from:'S',to:'A',cost:4},{id:'SB',from:'S',to:'B',cost:2},
  {id:'AB',from:'A',to:'B',cost:1},{id:'AT',from:'A',to:'T',cost:10},
  {id:'BC',from:'B',to:'C',cost:3},{id:'CT',from:'C',to:'T',cost:1},
];
const INF='inf';
const DIJK_STEPS=[
  {title:'Step 0 - Initialize',
   desc:'Start by setting the distance to S as 0. Everything else is unknown, so we mark it infinity. Put S in the queue. Nothing has been visited yet.',
   dist:{S:0,A:INF,B:INF,C:INF,T:INF},prev:{S:null,A:null,B:null,C:null,T:null},
   visited:[],current:null,examining:[],pq:'S(0)'},
  {title:'Step 1 - Visit S (cost 0)',
   desc:'S has the smallest distance in the queue, so we visit it. Check neighbors: going to A costs 0+4=4, going to B costs 0+2=2. We update both.',
   dist:{S:0,A:4,B:2,C:INF,T:INF},prev:{S:null,A:'S',B:'S',C:null,T:null},
   visited:['S'],current:'S',examining:['SA','SB'],pq:'B(2), A(4)'},
  {title:'Step 2 - Visit B (cost 2)',
   desc:'B is cheapest now (cost 2), so we visit it. Going through B to A costs 2+1=3, which beats the old 4 - we update A. B to C costs 2+3=5 - we update C too.',
   dist:{S:0,A:3,B:2,C:5,T:INF},prev:{S:null,A:'B',B:'S',C:'B',T:null},
   visited:['S','B'],current:'B',examining:['AB','BC'],pq:'A(3), C(5)'},
  {title:'Step 3 - Visit A (cost 3)',
   desc:'A is cheapest now (cost 3), so we visit it. Going through A to T costs 3+10=13, so we write that down. B is already done so we skip it.',
   dist:{S:0,A:3,B:2,C:5,T:13},prev:{S:null,A:'B',B:'S',C:'B',T:'A'},
   visited:['S','B','A'],current:'A',examining:['AT'],pq:'C(5), T(13)'},
  {title:'Step 4 - Visit C (cost 5)',
   desc:'C is cheapest now (cost 5), so we visit it. Going through C to T costs 5+1=6, which beats the old 13 - better path found!',
   dist:{S:0,A:3,B:2,C:5,T:6},prev:{S:null,A:'B',B:'S',C:'B',T:'C'},
   visited:['S','B','A','C'],current:'C',examining:['CT'],pq:'T(6)'},
  {title:'Step 5 - Visit T (cost 6) - Done!',
   desc:'We reached T with total cost 6. To find the path, work backwards using prev[]: T came from C, C came from B, B came from S. Path: S -> B -> C -> T (cost 2+3+1=6).',
   dist:{S:0,A:3,B:2,C:5,T:6},prev:{S:null,A:'B',B:'S',C:'B',T:'C'},
   visited:['S','B','A','C','T'],current:'T',examining:[],pq:'empty',
   finalPath:['S','B','C','T']},
];

let currentSlide=0,showAreas=false,activeScenario=null,dijkStep=0;
const totalSlides=14;
const slideTitles=['Introduction','Motivation','Graph Theory & Routers',"Dijkstra's Algorithm",'How OSPF Works','Network Topology','Reading OSPF Areas','Simulation Setup','Results - No Area','Results - With Areas','Conclusion','Future Work','References','Group Contributions'];

function linkId(a,b){return[a,b].sort().join('');}
function pathLinks(path){const s=new Set();for(let i=0;i<path.length-1;i++)s.add(linkId(path[i],path[i+1]));return s;}

function buildSVG(scenario,showA){
  const activeLinks=scenario?pathLinks(scenario.path):new Set();
  const activeNodes=new Set(scenario?scenario.path:[]);
  const pathColor=scenario?scenario.color:COLORS.cyan;
  let svg=`<svg viewBox="0 0 660 320" style="width:100%;max-height:280px"><defs><style>.active-link{stroke-dasharray:8 4;animation:dashAnim 1s linear infinite}@keyframes dashAnim{to{stroke-dashoffset:-24}}</style></defs>`;
  if(showA){
    svg+=`<rect x="40" y="44" width="210" height="215" rx="14" fill="${COLORS.cyan}" fill-opacity=".07" stroke="${COLORS.cyan}" stroke-opacity=".35" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="52" y="62" fill="${COLORS.cyan}" font-size="11" font-family="'JetBrains Mono',monospace" font-weight="600">Area 1 (0.0.0.1)</text>
    <rect x="244" y="44" width="140" height="215" rx="14" fill="${COLORS.yellow}" fill-opacity=".07" stroke="${COLORS.yellow}" stroke-opacity=".35" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="256" y="62" fill="${COLORS.yellow}" font-size="11" font-family="'JetBrains Mono',monospace" font-weight="600">Area 0 (backbone)</text>
    <rect x="436" y="44" width="200" height="215" rx="14" fill="${COLORS.purple}" fill-opacity=".07" stroke="${COLORS.purple}" stroke-opacity=".35" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="448" y="62" fill="${COLORS.purple}" font-size="11" font-family="'JetBrains Mono',monospace" font-weight="600">Area 2 (0.0.0.2)</text>`;
  }
  LINKS.forEach(link=>{
    const f=ROUTERS[link.from],t=ROUTERS[link.to];
    const isA=activeLinks.has(link.id);
    const mx=(f.x+t.x)/2,my=(f.y+t.y)/2-7;
    svg+=`<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}" stroke="${isA?pathColor:COLORS.border}" stroke-width="${isA?3:1.5}" ${isA?'class="active-link"':''}/>`;
    svg+=`<text x="${mx}" y="${my}" text-anchor="middle" fill="${isA?pathColor:COLORS.muted}" font-size="10" font-family="'JetBrains Mono',monospace" font-weight="${isA?'600':'400'}">${link.cost}</text>`;
  });
  Object.entries(ROUTERS).forEach(([name,r])=>{
    const isA=activeNodes.has(name);
    const ac=AREACOLOR[r.area];
    const fill=isA?pathColor:COLORS.surf2;
    const stroke=showA?ac:(isA?pathColor:COLORS.border);
    const textFill=isA?'#0a0f1e':COLORS.text;
    svg+=`<circle cx="${r.x}" cy="${r.y}" r="22" fill="${fill}" stroke="${stroke}" stroke-width="${isA?3:1.5}"/>
    <text x="${r.x}" y="${r.y+1}" text-anchor="middle" dominant-baseline="central" fill="${textFill}" font-size="14" font-weight="700" font-family="'JetBrains Mono',monospace">${name}</text>`;
    if(isA&&scenario){svg+=`<circle cx="${r.x}" cy="${r.y}" r="28" fill="none" stroke="${pathColor}" stroke-width="1" stroke-opacity=".4" stroke-dasharray="3 3"/>`;}
  });
  return svg+'</svg>';
}

function buildDijkstraSVG(step){
  const examining=new Set(step.examining);
  const visitedSet=new Set(step.visited);
  const finalPath=step.finalPath?new Set(step.finalPath.reduce((acc,n,i,arr)=>{if(i<arr.length-1)acc.push([n,arr[i+1]].sort().join(''));return acc;},[])):(new Set());
  let svg=`<svg viewBox="0 0 580 300" style="width:100%;max-height:230px"><defs><style>.dk-anim{stroke-dasharray:8 4;animation:dashAnim 1s linear infinite}@keyframes dashAnim{to{stroke-dashoffset:-24}}</style></defs>`;
  DK_EDGES.forEach(edge=>{
    const f=DK_NODES[edge.from],t=DK_NODES[edge.to];
    const isEx=examining.has(edge.id),isFin=finalPath.has(edge.id);
    const mx=(f.x+t.x)/2,my=(f.y+t.y)/2-8;
    let stroke=COLORS.border,sw=1.5,cls='';
    if(isFin){stroke=COLORS.green;sw=3;cls='dk-anim';}
    else if(isEx){stroke=COLORS.yellow;sw=2.5;cls='dk-anim';}
    svg+=`<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}" stroke="${stroke}" stroke-width="${sw}" ${cls?`class="${cls}"`:''}/>`;
    svg+=`<text x="${mx}" y="${my}" text-anchor="middle" fill="${isEx||isFin?COLORS.yellow:COLORS.muted}" font-size="11" font-family="'JetBrains Mono',monospace" font-weight="${isEx||isFin?'700':'400'}">${edge.cost}</text>`;
  });
  Object.entries(DK_NODES).forEach(([name,pos])=>{
    const isCur=step.current===name,isVis=visitedSet.has(name),isFN=step.finalPath&&step.finalPath.includes(name);
    let fill=COLORS.surf2,stroke=COLORS.border,sw=1.5,tf=COLORS.text;
    if(isFN){fill=COLORS.green;stroke=COLORS.green;tf='#0a0f1e';}
    else if(isCur){fill=COLORS.yellow;stroke=COLORS.yellow;tf='#0a0f1e';}
    else if(isVis){fill=COLORS.cyan+'33';stroke=COLORS.cyan;sw=2;}
    svg+=`<circle cx="${pos.x}" cy="${pos.y}" r="24" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
    svg+=`<text x="${pos.x}" y="${pos.y}" text-anchor="middle" dominant-baseline="central" fill="${tf}" font-size="14" font-weight="700" font-family="'JetBrains Mono',monospace">${name}</text>`;
    const d=step.dist[name],dc=isFN?COLORS.green:(isCur?COLORS.yellow:(isVis?COLORS.cyan:COLORS.muted));
    svg+=`<text x="${pos.x}" y="${pos.y-32}" text-anchor="middle" fill="${dc}" font-size="11" font-family="'JetBrains Mono',monospace" font-weight="600">${d===INF?'inf':d}</text>`;
  });
  svg+=`<text x="10" y="285" fill="${COLORS.muted}" font-size="10" font-family="'JetBrains Mono',monospace">yellow = current  cyan ring = visited  yellow edge = checking  green = final path  number above = dist[]</text>`;
  return svg+'</svg>';
}

function slide0(){return`
<div style="display:flex;flex-direction:column;gap:12px;justify-content:center;flex:1">

// Slide 2: Graph Theory & Routers
function slideGraphTheory(){
  const miniSVG=`<svg viewBox="0 0 380 200" style="width:100%;max-height:185px">
    <line x1="80" y1="100" x2="200" y2="50" stroke="#1f2d44" stroke-width="1.5"/>

    <line x1="200" y1="150" x2="320" y2="100" stroke="#1f2d44" stroke-width="1.5"/>
    <line x1="200" y1="50" x2="200" y2="150" stroke="#1f2d44" stroke-width="1.5"/>

    <circle cx="80" cy="100" r="22" fill="#1a2332" stroke="#a78bfa" stroke-width="2"/>
    <text x="80" y="101" text-anchor="middle" dominant-baseline="central" fill="#a78bfa" font-size="12" font-weight="700" font-family="'JetBrains Mono',monospace">R1</text>
    <circle cx="200" cy="50" r="22" fill="#1a2332" stroke="#64748b" stroke-width="1.5"/>
    <text x="200" y="51" text-anchor="middle" dominant-baseline="central" fill="#e2e8f0" font-size="12" font-weight="700" font-family="'JetBrains Mono',monospace">R2</text>
    <circle cx="200" cy="150" r="22" fill="#1a2332" stroke="#64748b" stroke-width="1.5"/>

// Slide 3: Dijkstra's Algorithm
function slideDijkstra(){
  const step=DIJK_STEPS[dijkStep];
  const isFirst=dijkStep===0,isLast=dijkStep===DIJK_STEPS.length-1;
  const nodes=['S','A','B','C','T'];
  return`
<div style="display:flex;flex-direction:column;gap:10px;flex:1">
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div>
      <span class="tag" style="background:#1a1400;color:${COLORS.yellow};border:1px solid ${COLORS.yellow}33;margin-bottom:4px;display:inline-block">Interactive</span>
      <h2>Dijkstra's Shortest Path Algorithm</h2>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <button class="step-btn" onclick="stepDijkstra(-1)" ${isFirst?'disabled':''}>&#8592; Back</button>
      <span class="mono" style="font-size:12px;color:#64748b">${dijkStep+1} / ${DIJK_STEPS.length}</span>
      <button class="step-btn" onclick="stepDijkstra(1)" ${isLast?'disabled':''}>Next &#8594;</button>
      <button class="step-btn" onclick="resetDijkstra()">Reset</button>
    </div>
  </div>
  <div class="grid2" style="flex:1;gap:12px">
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="card" style="padding:10px">${buildDijkstraSVG(step)}</div>
      <div style="padding:10px 14px;background:#1a1400;border-radius:8px;border:1px solid ${COLORS.yellow}33">
        <p style="font-size:12px;font-weight:700;color:${COLORS.yellow};margin-bottom:4px">${step.title}</p>
        <p style="font-size:12px;color:#94a3b8;line-height:1.65">${step.desc}</p>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="card" style="padding:10px">
        <p style="font-size:11px;font-weight:700;color:${COLORS.cyan};margin-bottom:8px">Distance Table - dist[]</p>
        <table class="dijk-table">
          <thead><tr><th>Node</th><th>dist[]</th><th>prev[]</th><th>Status</th></tr></thead>
          <tbody>${nodes.map(n=>{
            const isVis=step.visited.includes(n),isCur=step.current===n,isFin=step.finalPath&&step.finalPath.includes(n);
            const d=step.dist[n],p=step.prev[n];
            let sc=COLORS.muted,st='unvisited',rb='transparent';
            if(isFin){sc=COLORS.green;st='on path';rb=COLORS.green+'11';}
            else if(isCur){sc=COLORS.yellow;st='current';rb=COLORS.yellow+'11';}
            else if(isVis){sc=COLORS.cyan;st='visited';rb=COLORS.cyan+'0a';}
            return`<tr style="background:${rb}">
              <td style="font-weight:700;color:${isCur?COLORS.yellow:(isFin?COLORS.green:(isVis?COLORS.cyan:COLORS.text))}">${n}</td>
              <td style="color:${d===INF?COLORS.muted:COLORS.text};font-weight:${d===INF?'400':'700'}">${d===INF?'inf':d}</td>
              <td style="color:${COLORS.muted}">${p||'none'}</td>
              <td style="color:${sc};font-size:10px">${st}</td>
            </tr>`;}).join('')}
          </tbody>
        </table>
      </div>
      <div class="card" style="padding:10px">
        <p style="font-size:11px;font-weight:700;color:${COLORS.purple};margin-bottom:6px">Priority Queue (min-heap)</p>
        <p class="mono" style="font-size:12px;color:${step.pq==='empty'?COLORS.muted:COLORS.text}">${step.pq==='empty'?'[ empty ]':'[ '+step.pq+' ]'}</p>
        <p style="font-size:11px;color:#4b6180;margin-top:6px">The node with the smallest distance always gets picked next.</p>
        <div style="margin-top:8px;padding:7px 10px;background:#0a0f1e;border-radius:6px;border-left:2px solid ${COLORS.purple}44">
          <p style="font-size:11px;color:#64748b;line-height:1.6"><b style="color:${COLORS.purple}">Notation:</b> <span class="mono" style="color:${COLORS.cyan}">S(0)</span> means node S has a current known distance of 0. In general, <span class="mono" style="color:${COLORS.cyan}">X(n)</span> means "node X with distance n." The queue always pops the entry with the smallest n first.</p>
        </div>
      </div>
      <div class="card" style="padding:10px;font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.8;color:#4b6180;flex:1">
        <p style="color:${COLORS.cyan};font-weight:700;margin-bottom:4px">// Pseudocode</p>
        <p>dist[src] = 0; dist[all others] = inf</p>
        <p>pq.push(src, 0)</p>
        <p style="color:${COLORS.yellow}">while pq is not empty:</p>
        <p>&nbsp;&nbsp;u = pq.pop_min()</p>
        <p>&nbsp;&nbsp;for each neighbor v of u:</p>
        <p>&nbsp;&nbsp;&nbsp;&nbsp;alt = dist[u] + w(u, v)</p>
        <p>&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:${COLORS.green}">if alt &lt; dist[v]:</span></p>
        <p>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;dist[v] = alt; prev[v] = u</p>
        <p>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;pq.push(v, alt)</p>
      </div>
    </div>
  </div>
</div>`;}

const SLIDE_RENDERERS=[slide0,slideMotivation,slideGraphTheory,slideDijkstra,slideOSPF,slideTopology,slideReadingAreas,slideSimSetup,slideNoArea,slideWithAreas,slideConclusion,slideFutureWork,slideReferences,slideContributions];

function render(){
  document.getElementById('slide-content').innerHTML=SLIDE_RENDERERS[currentSlide]();
  document.getElementById('prev-btn').disabled=currentSlide===0;
  document.getElementById('next-btn').disabled=currentSlide===totalSlides-1;
  document.getElementById('slide-label').textContent=slideTitles[currentSlide]+` (${currentSlide+1}/${totalSlides})`;
  const dots=document.getElementById('dots');
  dots.innerHTML=[...Array(totalSlides)].map((_,i)=>`<div class="dot ${i===currentSlide?'active':''}" onclick="goSlide(${i})" title="${slideTitles[i]}"></div>`).join('');
}
function prevSlide(){if(currentSlide>0){currentSlide--;render();}}
function nextSlide(){if(currentSlide<totalSlides-1){currentSlide++;render();}}
function goSlide(i){currentSlide=i;render();}
function toggleAreas(v){showAreas=v;render();}
function setScenario(id){activeScenario=id;render();}
function stepDijkstra(dir){dijkStep=Math.max(0,Math.min(DIJK_STEPS.length-1,dijkStep+dir));render();}
function resetDijkstra(){dijkStep=0;render();}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextSlide();if(e.key==='ArrowLeft')prevSlide();});
render();
</script>
